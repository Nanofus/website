<!DOCTYPE html>
<html>
  <head>
    <title>Personal Dashboard</title>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200;300&display=swap" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16x16.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <p>Google Sheets API Quickstart</p>

    <button id="authorize_button" style="display: none">Login</button>
    <button id="signout_button" style="display: none">Logout</button>

    <pre id="content" style="white-space: pre-wrap"></pre>

    <script type="text/javascript">
      var CLIENT_ID = '430566502947-vd6rdre3vkebkkj3ubgn2vhgo1f8vj29.apps.googleusercontent.com';
      var API_KEY = 'AIzaSyDdmMwhxuakyAJjo62IieJ8b0w_EACTYf4';
      var DISCOVERY_DOCS = ['https://sheets.googleapis.com/$discovery/rest?version=v4'];
      var SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
      var SPREADSHEET_ID = '1WYhMLmK7TEYeiqn3Q3gEQ83dHuT9nZlMGBg8TrI1az4';

      var authorizeButton = document.getElementById('authorize_button');
      var signoutButton = document.getElementById('signout_button');

      function handleClientLoad() {
        gapi.load('client:auth2', () => {
          gapi.client
            .init({
              apiKey: API_KEY,
              clientId: CLIENT_ID,
              discoveryDocs: DISCOVERY_DOCS,
              scope: SCOPES,
            })
            .then(
              function () {
                gapi.auth2.getAuthInstance().isSignedIn.listen(updateSigninStatus);
                updateSigninStatus(gapi.auth2.getAuthInstance().isSignedIn.get());
                authorizeButton.onclick = handleAuthClick;
                signoutButton.onclick = handleSignoutClick;
              },
              function (error) {
                appendPre(JSON.stringify(error, null, 2));
              }
            );
        });
      }

      function updateSigninStatus(isSignedIn) {
        if (isSignedIn) {
          authorizeButton.style.display = 'none';
          signoutButton.style.display = 'block';
        } else {
          authorizeButton.style.display = 'block';
          signoutButton.style.display = 'none';
        }
      }

      function handleAuthClick(event) {
        gapi.auth2.getAuthInstance().signIn();
      }
      function handleSignoutClick(event) {
        gapi.auth2.getAuthInstance().signOut();
      }

      function appendPre(message) {
        var pre = document.getElementById('content');
        var textContent = document.createTextNode(message + '\n');
        pre.appendChild(textContent);
      }

      function listMajors() {
        /*gapi.client.sheets.spreadsheets.values.get({
          spreadsheetId: '1WYhMLmK7TEYeiqn3Q3gEQ83dHuT9nZlMGBg8TrI1az4',
          range: '🌳 Daily Log!C8:J1000',
        }).then(function(response) {
          var range = response.result;
          if (range.values.length > 0) {
            appendPre('Name, Major:');
            for (i = 0; i < range.values.length; i++) {
              var row = range.values[i];
              // Print columns A and E, which correspond to indices 0 and 4.
              appendPre(row[0] + ', ' + row[4]);
            }
          } else {
            appendPre('No data found.');
          }
        }, function(response) {
          appendPre('Error: ' + response.result.error.message);
        });*/
      }

      function submitDaily() {
        gapi.client.sheets.spreadsheets.values.update({
          spreadsheetId: SPREADSHEET_ID,
          range: '🌳 Daily Log!C8:J1000',
        });
      }
    </script>

    <script
      async
      defer
      src="https://apis.google.com/js/api.js"
      onload="this.onload=function(){};handleClientLoad()"
      onreadystatechange="if (this.readyState === 'complete') this.onload()"
    ></script>
  </body>
</html>
