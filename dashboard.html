<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Personal Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200;300&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        #current-date {
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <main>
        <h1><span id="current-time"></span> <span id="current-date"></span></h1>
        <h2 title="Projects">Tools</h2>
        <ul>
            <li><a href="https://beta.todoist.com/app/today">Tasks</a></li>
            <li><a href="https://www.notion.so/nanofus/Notes-e5b86181f69c467a8a473e6a344ef6f9">Notes</a></li>
            <li><a href="https://calendar.google.com/">Calendar</a></li>
            <li><a href="https://app.hey.com/">Email</a></li>
            <li><a href="https://drive.google.com/">Cloud Storage</a></li>
            <br>
            <li><a href="https://docs.google.com/spreadsheets/d/1WYhMLmK7TEYeiqn3Q3gEQ83dHuT9nZlMGBg8TrI1az4/edit#gid=0">Budget</a></li>
            <li><a href="https://docs.google.com/spreadsheets/d/1tqGctDTmuZUOORutxjNlDBEsd2eDeEV19pNb4_WmIec/edit#gid=0">Shared Budget</a></li>
            <li><a href="https://docs.google.com/spreadsheets/d/1p5MUlihU7G-1i3tF-C2jfKRjmMClNxTm-DBQthpa8eM/edit#gid=0">Perikoto Time Reporting</a></li>
            <br>
            <li><a href="https://coffitivity.com/">Coffitivity</a></li>
        </ul>
    </main>
    <script>
        let checkTime = (i) => {
            if (i < 10) {
                i = "0" + i;
            }
            return i;
        }

        let startTime = () => {

            // Time
            var today = new Date();
            var h = today.getHours();
            var m = today.getMinutes();
            var s = today.getSeconds();
            m = checkTime(m);
            s = checkTime(s);
            document.getElementById('current-time').innerHTML = h + ":" + m + ":" + s;

            //Date
            var today = new Date();
            var dd = String(today.getDate()).padStart(2, '0');
            var mm = String(today.getMonth() + 1).padStart(2, '0');
            var yyyy = today.getFullYear();
            today = mm + '/' + dd + '/' + yyyy;
            document.getElementById('current-date').innerHTML = dd + '.' + mm + '.' + yyyy;
            
            t = setTimeout(() => {
                startTime()
            }, 500);
        }
        startTime();
    </script>
</body>

</html>
