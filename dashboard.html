<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Personal Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200;300&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <h1 id="current-time"></h1>
        <h2 title="Projects">Tools</h2>
        <ul>
            <li><a href="https://beta.todoist.com/app/today" target="blank">Tasks</a></li>
            <li><a href="https://www.notion.so/nanofus/Notes-e5b86181f69c467a8a473e6a344ef6f9" target="_blank">Notes</a></li>
            <li><a href="https://calendar.google.com/" target="_blank">Calendar</a></li>
            <li><a href="https://app.hey.com/" target="blank">Email</a></li>
            <li><a href="https://drive.google.com/" target="_blank">Cloud Storage</a></li>
            <br>
            <li><a href="https://docs.google.com/spreadsheets/d/1WYhMLmK7TEYeiqn3Q3gEQ83dHuT9nZlMGBg8TrI1az4/edit#gid=0" target="_blank">Budget</a></li>
            <li><a href="https://docs.google.com/spreadsheets/d/1tqGctDTmuZUOORutxjNlDBEsd2eDeEV19pNb4_WmIec/edit#gid=0" target="_blank">Shared Budget</a></li>
            <li><a href="hhttps://docs.google.com/spreadsheets/d/1p5MUlihU7G-1i3tF-C2jfKRjmMClNxTm-DBQthpa8eM/edit#gid=0" target="_blank">Perikoto Time Reporting</a></li>
        </ul>
    </main>
    <script>
        let checkTime = (i) => {
            if (i < 10) {
                i = "0" + i;
            }
            return i;
        }

        let startTime = () => {
            var today = new Date();
            var h = today.getHours();
            var m = today.getMinutes();
            var s = today.getSeconds();
            // add a zero in front of numbers<10
            m = checkTime(m);
            s = checkTime(s);
            document.getElementById('current-time').innerHTML = h + ":" + m + ":" + s;
            t = setTimeout(() => {
                startTime()
            }, 500);
        }
        startTime();
    </script>
</body>

</html>
